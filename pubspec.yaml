name: openclaw_android
description: OpenClaw AI Gateway for Android - All-in-one standalone app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  web_socket_channel: ^3.0.1
  webview_flutter: ^4.9.0
  terminalkit: ^0.5.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  http: ^1.2.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  camera_android: ^0.10.9+1
  location: ^7.0.1
  archive: ^3.6.1
  package_info_plus: ^8.1.0
  device_info_plus: ^10.1.2
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/scripts/
