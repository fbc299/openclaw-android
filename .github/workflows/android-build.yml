name: Android Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'openclaw-android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'openclaw-android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch: 
    inputs:
      description:
        description: 'Trigger a manual build'
        required: true
        type: string

jobs:
  build-android:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permissions
      run: |
        chmod +x ./scripts/download-node.sh
        chmod +x ./scripts/build-apk.sh
        
    - name: Cache Node.js runtime
      id: cache-node
      uses: actions/cache@v4
      with:
        path: assets/node
        key: ${{ runner.os }}-node-v22.14.0-${{ hashFiles('scripts/download-node.sh') }}
        
    - name: Download Node.js runtime (if not cached)
      if: steps.cache-node.outputs.cache-hit != 'true'
      run: |
        ./scripts/download-node.sh arm64 v22.14.0
        ./scripts/download-node.sh arm v22.14.0
        ./scripts/download-node.sh x86_64 v22.14.0
        
    - name: Install Flutter dependencies
      run: flutter pub get
      
    - name: Build APK (split per ABI)
      run: ./scripts/build-apk.sh --split
      
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openclaw-android-apk
        path: |
          build/app/outputs/flutter-apk/*-release.apk
        retention-days: 7
        
    - name: Create release (on main branch)
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/app/outputs/flutter-apk/*-release.apk
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: v${{ github.sha }}
        draft: false
        prerelease: true

  test-android:
    runs-on: ubuntu-latest
    needs: build-android
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test
      
    - name: Analyze code
      run: flutter analyze